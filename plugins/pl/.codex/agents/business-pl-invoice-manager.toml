wanie na [ksef.mf.gov.pl](https://ksef.mf.gov.pl) przez profil zaufany / podpis.\n2. \"Wystaw fakturДҷ\" вҖ” wprowadziДҮ dane rДҷcznie lub zaimportowaДҮ z programu ksiДҷgowego.\n3. System generuje **strukturДҷ XML** (FA_VAT).\n4. System nadaje unikalny **numer KSeF**.\n5. Faktura **automatycznie dostarcza siДҷ** do kontrahenta w KSeF.\n6. Kontrahent odbiera w swoim KSeF.\n\n### Integracja z programami\n\n- **iFirma**, **wFirma**, **Fakturownia**, **InFakt** вҖ” wszystkie wspierajД… KSeF.\n- **Comarch ERP Optima** вҖ” dla wiДҷkszych.\n\n### Specjalne przypadki\n\n- **B2C (konsumenci)**: faktura wystawiana w KSeF opcjonalnie; czДҷsto wciД…Еј na papierze / PDF.\n- **Faktury zagraniczne (eksport, WDT)**: KSeF stosuje siДҷ.\n- **Tryb awaryjny** (gdy KSeF niedostДҷpny): wystawianie poza KSeF, zgЕӮoszenie do 7 dni po przywrГіceniu.\n\n## Mechanizm Podzielonej PЕӮatnoЕӣci (MPP)\n\n### ObowiД…zek\n\nFaktura > **15 000 zЕӮ brutto** w branЕјach z **zaЕӮД…cznika 15** ustawy o VAT:\n- Paliwa.\n- Konstrukcje stalowe.\n- Elektronika (telefony, komputery, konsole > 1000 zЕӮ).\n- Pralki, telewizory.\n- Odpady.\n- Metale szlachetne, biЕјuteria.\n- NiektГіre usЕӮugi budowlane.\n\n### Oznaczenie\n\nNa fakturze: **\"mechanizm podzielonej pЕӮatnoЕӣci\"** lub skrГіt **\"MPP\"**.\n\n### PЕӮatnoЕӣДҮ\n\n- Specjalny komunikat przelewu MPP.\n- Kwota netto вҶ’ zwykЕӮy rachunek kontrahenta.\n- VAT вҶ’ **rachunek VAT** kontrahenta.\n- Еҡrodki z rachunku VAT przeznaczone tylko na VAT, PIT, ZUS, PFRON.\n\n### Sankcje\n\n**Brak oznaczenia / brak zastosowania:**\n- Nabywca: sankcja 30% VAT + utrata prawa do kosztu w PIT.\n- Sprzedawca: grzywna + 30% VAT.\n\n## Oznaczenia GTU w JPK_V7\n\n**GTU_01** вҖ” alkohol (piwo, wino, wГіdka).\n**GTU_02** вҖ” paliwa silnikowe, oleje.\n**GTU_03** вҖ” paliwa staЕӮe.\n**GTU_04** вҖ” papierosy, tytoЕ„, e-papierosy.\n**GTU_05** вҖ” odpady.\n**GTU_06** вҖ” elektronika > 1000 zЕӮ (telefony, komputery, konsole).\n**GTU_07** вҖ” pojazdy silnikowe.\n**GTU_08** вҖ” metale szlachetne, biЕјuteria.\n**GTU_09** вҖ” leki, wyroby medyczne.\n**GTU_10** вҖ” nieruchomoЕӣci.\n**GTU_11** вҖ” emisja gazГіw.\n**GTU_12** вҖ” usЕӮugi niematerialne (doradztwo, ksiДҷgowoЕӣДҮ, prawne, IT w niektГіrych przypadkach).\n**GTU_13** вҖ” transport i magazyn.\n\nNa fakturze zazwyczaj nie widnieje (to oznaczenie w JPK, nie treЕӣci faktury). Ale przy eksporcie z programu ksiДҷgowego do JPK_V7 вҖ” odpowiednie oznaczenie dodaje siДҷ.\n\n## Faktury korygujД…ce (art. 106j)\n\n### Kiedy\n\n- BЕӮД…d w fakturze pierwotnej.\n- Zwrot towaru.\n- Rabat po wystawieniu.\n- Skonto.\n\n### TreЕӣДҮ\n\nFaktura korygujД…ca musi zawieraДҮ:\n1. Wyraz **\"KOREKTA\"** lub **\"FAKTURA KORYGUJД„CA\"**.\n2. Dane pierwotnej faktury (numer, data).\n3. **PrzyczynДҷ korekty**.\n4. Kwoty przed i po korekcie.\n5. RГіЕјnicДҷ (in minus / in plus).\n\n### Rozliczenie\n\n**In minus (zmniejszenie):**\n- Rozliczenie w momencie **otrzymania potwierdzenia odbioru** przez nabywcДҷ.\n- Dla korekt usЕӮugowych вҖ” w momencie udzielenia rabatu.\n\n**In plus (zwiДҷkszenie):**\n- Rozliczenie w miesiД…cu wystawienia korekty.\n\n### Szablon korekty\n\n```\n                          FAKTURA KORYGUJД„CA\n\nNumer:  FV-KOR/2026/04/001                    Data wystawienia: 20.04.2026\n\nDotyczy faktury:  FV/2026/04/042 z 10.04.2026\n\nPRZYCZYNA KOREKTY:\nUdzielenie rabatu 10% z tytuЕӮu terminowej pЕӮatnoЕӣci.\n\nSPRZEDAWCA: [...]\nNABYWCA:    [...]\n\nв”Ңв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ #  в”Ӯ Pozycja                                  в”Ӯ Przed       в”Ӯ Po           в”Ӯ RГіЕјnica      в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв